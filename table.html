<!DOCTYPE html>
<html>
<head>
    <title>Table with Attributes</title>
</head>

<body>

    <h2 align="center">Student Details Table</h2>

    <table border="2"
           width="70%"
           height="200"
           align="center">

        <tr >
            <th rowspan="3">Days</th>
            <th colspan="3">Seminar</th>       
        </tr>

        <tr align="center">
            <th colspan="2">Schedule</th>
            <th rowspan="2">Topics</th>
        </tr>

        <tr align="center">
            <th>Begin</th>
            <th>End</th>
        </tr>
        
        <tr align="center">
            <td rowspan="2">Monday</td>
            <td rowspan="2">8:00am</td>
            <td rowspan="2">5:00pm</td>
            <td>Introduction to XML</td>
       </tr>

       <tr align="center">
        <td>Validity:DTD and Relax NG</td>
       </tr>
       <tr align="center">
        <td rowspan="3">Tuesday</td>
        <td>8:00am</td>
        <td>11:00am</td>
        <td rowspan="2"> XPath</td>
       </tr>

       <tr align="center">
        <td>11:00am</td>
        <td>2:00pm</td>
       </tr>

       <tr align="center">
        <td>2:00pm</td>
        <td>5:00pm</td>
        <td>XSL Transformations</td>
       </tr>

       <tr align="center">
        <td>Wednesday</td>
        <td>8:00am</td>
        <td>12:00pm</td>
        <td>XSL Formatting Objects</td>
       </tr>
    </table>

</body>
</html>
