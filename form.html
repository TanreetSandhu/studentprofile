<!DOCTYPE html>
<html>
<head>
    <title>All HTML Form Elements</title>
</head>

<body>

    <h1>Complete HTML Form</h1>

    <form>

        <!-- Text Input -->
        <label>Full Name:</label>
        <input type="text" placeholder="Enter your name">
        <br><br>

        <!-- Password -->
        <label>Password:</label>
        <input type="password" placeholder="Enter password">
        <br><br>

        <!-- Email -->
        <label>Email:</label>
        <input type="email" placeholder="Enter email">
        <br><br>

        <!-- Number -->
        <label>Age:</label>
        <input type="number" min="1" max="100">
        <br><br>

        <!-- Phone -->
        <label>Phone:</label>
        <input type="tel" placeholder="Enter phone number">
        <br><br>

        <!-- Date -->
        <label>Date of Birth:</label>
        <input type="date">
        <br><br>

        <!-- Time -->
        <label>Time:</label>
        <input type="time">
        <br><br>

        <!-- Datetime -->
        <label>Date & Time:</label>
        <input type="datetime-local">
        <br><br>

        <!-- Month -->
        <label>Month:</label>
        <input type="month">
        <br><br>

        <!-- Week -->
        <label>Week:</label>
        <input type="week">
        <br><br>

        <!-- Color -->
        <label>Favorite Color:</label>
        <input type="color">
        <br><br>

        <!-- Range -->
        <label>Range:</label>
        <input type="range" min="0" max="100">
        <br><br>

        <!-- Search -->
        <label>Search:</label>
        <input type="search" placeholder="Search here">
        <br><br>

        <!-- URL -->
        <label>Website:</label>
        <input type="url" placeholder="Enter website URL">
        <br><br>

        <!-- Radio Buttons -->
        <label>Gender:</label>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Other
        <br><br>

        <!-- Checkboxes -->
        <label>Hobbies:</label>
        <input type="checkbox"> Reading
        <input type="checkbox"> Music
        <input type="checkbox"> Sports
        <br><br>

        <!-- Select Dropdown -->
        <label>Course:</label>
        <select>
            <option>BCA</option>
            <option>BBA</option>
            <option>MCA</option>
            <option>B.Tech</option>
        </select>
        <br><br>

        <!-- Multiple Select -->
        <label>Skills:</label>
        <select multiple>
            <option>HTML</option>
            <option>CSS</option>
            <option>JavaScript</option>
            <option>Python</option>
        </select>
        <br><br>

        <!-- Textarea -->
        <label>Address:</label><br>
        <textarea rows="5" cols="30"></textarea>
        <br><br>

        <!-- File Upload -->
        <label>Upload File:</label>
        <input type="file">
        <br><br>

        <!-- Hidden Input -->
        <input type="hidden" value="hiddenData">

        <!-- Image Button -->
        <label>Image Button:</label><br>
        <input type="image"
        src="https://via.placeholder.com/100x40"
        alt="Submit">
        <br><br>

        <!-- Buttons -->
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
        <input type="button" value="Click Me">

    </form>

</body>
</html>
